<!doctype html>
<html lang="fr">
<head><meta charset="utf-8"><title>Contrôle concours</title></head>
<body>
  <form id="check-form">
    <input name="twitchUsername" value="codex_test_2245">
    <input name="discordUsername" value="codex_test_2245">
    <button type="submit">Tester l’inscription</button>
  </form>
  <pre id="result">En attente</pre>
  <script>
    document.querySelector('#check-form').addEventListener('submit', async event => {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      const response = await fetch('/api/contest-entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.fromEntries(data))
      });
      document.querySelector('#result').textContent = `${response.status} ${await response.text()}`;
    });
  </script>
</body>
</html>
