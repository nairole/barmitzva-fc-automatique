name: Analyse automatique Barmitzva FC

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

concurrency:
  group: analyse-barmitzva
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Récupérer le programme
        uses: actions/checkout@v4

      - name: Préparer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Installer la lecture vidéo et OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Analyser une rediffusion en attente
        env:
          SITE_URL: https://barmitzva-fc.vercel.app
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          AUTO_PUBLISH: "true"
          INCLUDE_HISTORY: "false"
          MARK_SCANNED: "true"
          MAX_VODS: "1"
          SAMPLE_SECONDS: "5"
          MIN_CONFIRMATIONS: "3"
        run: python analyze.py

